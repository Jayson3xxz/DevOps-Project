services:
  ollama:
    image: model:latest
    container_name: ollama_llm
    restart: unless-stopped

    ports:
      - "${OLLAMA_HOST_PORT}:11434"

    env_file:
      - .env

    environment:
      - OLLAMA_HOST=0.0.0.0:11434

  backend:

    image: backend:latest
    container_name: fastapi_backend
    restart: unless-stopped

    ports:
      - "${BACKEND_PORT}:8000"

    env_file:
      - .env

    depends_on:
      - ollama
